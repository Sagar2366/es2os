input {
  elasticsearch {
    hosts => ["es-source:9200"]
    index => "*,-.*"
    query => '{ "query": { "match_all": {} } }'
    size => 500
    scroll => "5m"
    docinfo => true
    docinfo_target => "[@metadata]"
  }
}

filter {
  mutate {
    add_field => { "[@metadata][migration_source]" => "elasticsearch-7.17" }
  }
}

output {
  opensearch {
    hosts => ["os-target:9200"]
    index => "%{[@metadata][_index]}"
    document_id => "%{[@metadata][_id]}"
    action => "index"
    retry_on_conflict => 3
    timeout => 60
  }

  stdout {
    codec => line { format => "Migrated: %{[@metadata][_index]}/%{[@metadata][_id]}" }
  }
}
