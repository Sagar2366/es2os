version: '3.8'

# Complete ES 7.17 → OpenSearch 2.19 migration stack
# Includes: ES source, OpenSearch target, Dashboards UI, Logstash migration pipeline
# Usage:
#   docker compose up -d
#   docker compose logs -f logstash
#   Open http://localhost:5601 for dashboards

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.27
    container_name: es-source
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: curl -s http://localhost:9200 | grep -q cluster_name
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - migration-net

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: os-target
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
    healthcheck:
      test: curl -s http://localhost:9200 | grep -q cluster_name
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - migration-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: os-dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=admin
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    healthcheck:
      test: curl -s http://localhost:5601 | grep -q opensearch
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - migration-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: logstash-migration
    environment:
      - "LS_JAVA_OPTS=-Xmx1024m -Xms1024m"
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipelines:/usr/share/logstash/pipeline:ro
    ports:
      - "5010:5000/tcp"
      - "5010:5000/udp"
      - "9600:9600"
    depends_on:
      - elasticsearch
      - opensearch
    networks:
      - migration-net
    healthcheck:
      test: curl -s http://localhost:9600 | grep -q logstash
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  migration-net:
    driver: bridge
