# Logstash pipeline: Migrate ALL indices from ES 7.17 → OpenSearch 2.19
# This reads every non-system index from ES and writes to OS preserving index names.

input {
  elasticsearch {
    hosts => ["http://es-source:9200"]
    index => "*,-.*"
    scroll => "5m"
    size => 1000
    docinfo => true
    docinfo_target => "[@metadata]"
  }
}

filter {
  # Preserve original index name and doc ID for exact replication
  mutate {
    remove_field => ["@version", "@timestamp"]
  }
}

output {
  opensearch {
    hosts => ["http://os-target:9200"]
    index => "%{[@metadata][_index]}"
    document_id => "%{[@metadata][_id]}"
    action => "index"
    retry_on_conflict => 3
    ssl_certificate_verification => false
  }

  # Stdout for demo visibility (shows progress in docker logs)
  stdout {
    codec => dots
  }
}
